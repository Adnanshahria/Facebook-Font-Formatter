<svg viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.7; transform: scale(0.9); }
    }
    .sparkle { animation: pulse 2s infinite ease-in-out; transform-origin: 75px 29px; }
    .dot { animation: pulse 2s infinite ease-in-out 0.5s; transform-origin: 86px 44px; }
  </style>

  <defs>
    <filter id="logoDropShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#4F46E5" flood-opacity="0.4" />
    </filter>
    
    <linearGradient id="bubbleGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#818CF8" />
      <stop offset="100%" stop-color="#4338CA" />
    </linearGradient>

    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E0E7FF" />
    </linearGradient>
  </defs>

  <!-- Decorative Outer Aura -->
  <circle cx="50" cy="50" r="45" fill="#6366F1" opacity="0.1" />

  <!-- Background Social Chat Bubble -->
  <path d="M 18 25 h 64 a 12 12 0 0 1 12 12 v 36 a 12 12 0 0 1 -12 12 h -25 l -15 15 v -15 h -24 a 12 12 0 0 1 -12 -12 v -36 a 12 12 0 0 1 12 -12 z" fill="url(#bubbleGrad)" filter="url(#logoDropShadow)" />

  <!-- Glassy Top Highlight for Premium Feel -->
  <path d="M 18 25 h 64 a 12 12 0 0 1 12 12 v 15 c -30 10 -60 5 -76 -5 v -10 a 12 12 0 0 1 12 -12 z" fill="white" opacity="0.12" />

  <!-- Typography: 'Aa' -->
  <text x="45" y="68" font-family="Georgia, 'Times New Roman', serif" font-size="40" font-weight="800" font-style="italic" fill="url(#textGrad)" text-anchor="middle" letter-spacing="-1">
    <tspan>A</tspan>
    <tspan dx="1" font-size="34">a</tspan>
  </text>

  <!-- Magic Sparkles -->
  <path class="sparkle" d="M 75 18 C 75 26 78 29 86 29 C 78 29 75 32 75 40 C 75 32 72 29 64 29 C 72 29 75 26 75 18 Z" fill="#34D399" />
  <circle class="dot" cx="86" cy="44" r="2.5" fill="#FDE047" />
  <circle cx="70" cy="50" r="1.5" fill="#A855F7" />
</svg>
